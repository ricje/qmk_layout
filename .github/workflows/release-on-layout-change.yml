name: Release On Layout Change

on:
  push:
    branches:
      - main
    paths:
      - "keyboards/**/keymaps/ricje/**"
      - "qmk.json"
      - "scripts/generate-layout-artifacts.sh"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Disable git safe directory checks
        run: git config --global --add safe.directory '*'

      - name: Checkout userspace
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: userspace

      - name: Checkout QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          ref: master
          path: qmk_firmware
          submodules: recursive

      - name: Point QMK CLI at qmk_firmware
        working-directory: userspace
        run: qmk config user.qmk_home="$GITHUB_WORKSPACE/qmk_firmware"

      - name: Install Cairo system libraries
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libcairo2 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev

      - name: Install layout artifact tools
        run: python3 -m pip install keymap-drawer cairosvg

      - name: Compute release tag
        id: calver
        working-directory: userspace
        run: |
          git fetch --tags --force
          today="$(date -u +%Y.%m.%d)"
          max_suffix="$(
            git tag -l "${today}*" | awk -F. -v today="$today" '
              $0 == today {
                if (max < 0) {
                  max = 0
                }
                found = 1
                next
              }

              $1 "." $2 "." $3 == today && $4 ~ /^[0-9]+$/ {
                if ($4 + 0 > max) {
                  max = $4 + 0
                }
                found = 1
              }

              END {
                if (found) {
                  print max
                }
              }
            '
          )"

          if [ -z "$max_suffix" ]; then
            tag_name="$today"
          else
            tag_name="${today}.$((max_suffix + 1))"
          fi

          printf 'tag=%s\n' "$tag_name" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        working-directory: userspace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.calver.outputs.tag }}" -m "Layout release ${{ steps.calver.outputs.tag }}"
          git push origin "${{ steps.calver.outputs.tag }}"

      - name: Build all userspace targets
        working-directory: userspace
        run: qmk userspace-compile

      - name: Collect firmware artifacts
        working-directory: userspace
        run: make firmware-artifacts

      - name: Generate layout artifacts
        working-directory: userspace
        run: QMK_HOME="$GITHUB_WORKSPACE/qmk_firmware" make layout-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.tag }}
          name: ${{ steps.calver.outputs.tag }}
          generate_release_notes: true
          files: |
            userspace/build/**/*
