name: QMK CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Disable git safe directory checks
        run: git config --global --add safe.directory '*'

      - name: Checkout userspace
        uses: actions/checkout@v4
        with:
          path: userspace

      - name: Checkout QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          ref: master
          path: qmk_firmware
          submodules: recursive

      - name: Point QMK CLI at qmk_firmware
        working-directory: userspace
        run: qmk config user.qmk_home="$GITHUB_WORKSPACE/qmk_firmware"

      - name: Build all userspace targets
        working-directory: userspace
        run: qmk userspace-compile

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qmk-firmware-artifacts
          path: |
            qmk_firmware/ergodox_ez_base_ricje*.hex
            qmk_firmware/crkbd_rev4_1_standard_ricje*.uf2
          if-no-files-found: error
